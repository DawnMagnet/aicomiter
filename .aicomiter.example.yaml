# aicomiter configuration template
#
# Scientific reproducibility rule:
# Effective config priority (high -> low)
# 1) CLI flags
# 2) Environment variables
# 3) YAML file
# 4) Built-in defaults

# ---------------- AI Control Surface ----------------
ai:
  # Provider under test: openai | anthropic
  provider: openai

  # Secret credential for selected provider
  api_key: sk-your-api-key-here

  # Optional endpoint override for proxy/self-hosted gateways
  # base_url: https://api.openai.com/v1

  # Optional model override; falls back to provider default when omitted
  # model: gpt-4o-mini

  # Sampling temperature in [0, 2]
  # Lower => more deterministic, Higher => more diverse
  temperature: 0.7

  # Nucleus sampling threshold in [0, 1]
  top_p: 1.0

  # Hard cap on completion length
  max_tokens: 500

  # Request timeout in seconds
  timeout: 30

# -------------- Generation Experiment Setup --------------
generate:
  # Output language code (e.g., en, zh)
  language: en

  # Number of candidates returned per invocation
  count: 1

# ---------------- Example Profiles ----------------
# Profile A: Stable production-like
# ai:
#   provider: openai
#   api_key: sk-xxx
#   model: gpt-4o-mini
#   temperature: 0.4
#   top_p: 1.0
