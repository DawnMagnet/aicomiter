name: Update Flake Hashes

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Published release tag, for example v0.2.3"
        required: true
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Download release checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          gh release download "$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern checksums.txt \
            --output "$RUNNER_TEMP/checksums.txt"
          for asset in \
            "aicomiter_${version}_linux_x86_64.tar.gz" \
            "aicomiter_${version}_linux_arm64.tar.gz" \
            "aicomiter_${version}_macOS_x86_64.tar.gz" \
            "aicomiter_${version}_macOS_arm64.tar.gz"; do
            grep -q "$asset" "$RUNNER_TEMP/checksums.txt"
          done

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Update and validate flake
        env:
          VERSION: ${{ inputs.release_tag }}
        run: |
          .github/scripts/update-flake-hashes.sh
          nix flake check --no-write-lock-file

      - name: Commit flake update
        env:
          VERSION: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if git diff --quiet -- flake.nix; then
            echo "flake hashes are already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git commit -m "chore: update flake hashes for ${VERSION}"
          git push origin HEAD:main
