name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      update_flake_tag:
        description: "Existing release tag whose checksums should update flake.nix"
        required: false
        type: string

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Install Rust 1.97.0
        run: rustup toolchain install 1.97.0 --profile minimal --component rustfmt,clippy
      - uses: Swatinem/rust-cache@v2.9.1
      - run: cargo +1.97.0 fmt --all -- --check
      - run: cargo +1.97.0 clippy --all-targets --all-features -- -D warnings
      - run: cargo +1.97.0 test --all-targets --locked

  release:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    needs: quality
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: Install Rust 1.97.0
        run: rustup toolchain install 1.97.0 --profile minimal
      - name: Install Rust release targets
        run: >-
          rustup target add
          x86_64-unknown-linux-musl
          aarch64-unknown-linux-musl
          x86_64-apple-darwin
          aarch64-apple-darwin
          x86_64-pc-windows-gnu
          aarch64-pc-windows-gnullvm
          --toolchain 1.97.0
      - uses: Swatinem/rust-cache@v2.9.1
      - uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.16.0
      - uses: taiki-e/install-action@v2.83.1
        with:
          tool: cargo-zigbuild@0.23.0
          fallback: none
      - uses: goreleaser/goreleaser-action@v7.2.3
        with:
          distribution: goreleaser
          version: "2.17.0"
          args: release --clean ${{ github.event_name == 'workflow_dispatch' && '--snapshot' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-flake-hashes:
    if: >-
      needs.release.result == 'success' &&
      (startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.update_flake_tag != ''))
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Download release checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.update_flake_tag || github.ref_name }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          gh release download "$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern checksums.txt \
            --output "$RUNNER_TEMP/checksums.txt"
          grep -q "aicomiter_${version}_linux_x86_64.tar.gz" "$RUNNER_TEMP/checksums.txt"
          grep -q "aicomiter_${version}_linux_arm64.tar.gz" "$RUNNER_TEMP/checksums.txt"
          grep -q "aicomiter_${version}_macOS_x86_64.tar.gz" "$RUNNER_TEMP/checksums.txt"
          grep -q "aicomiter_${version}_macOS_arm64.tar.gz" "$RUNNER_TEMP/checksums.txt"

      - name: Update flake hashes
        env:
          VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.update_flake_tag || github.ref_name }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          checksums="$RUNNER_TEMP/checksums.txt"

          checksum_for() {
            local asset="$1"
            awk -v asset="$asset" '$2 == asset { print $1; exit }' "$checksums"
          }

          replace_hash() {
            local asset="$1"
            local hash="$2"
            test "${#hash}" -eq 64
            ASSET="$asset" HASH="$hash" perl -0pi -e '
              my $asset = quotemeta($ENV{ASSET});
              s/(asset = "${asset}";\n\s+sha256 = ")[^"]+("\s*;)/$1$ENV{HASH}$2/;
            ' flake.nix
          }

          grep -q "version = \"$version\";" flake.nix
          replace_hash 'aicomiter_${version}_linux_x86_64.tar.gz' \
            "$(checksum_for "aicomiter_${version}_linux_x86_64.tar.gz")"
          replace_hash 'aicomiter_${version}_linux_arm64.tar.gz' \
            "$(checksum_for "aicomiter_${version}_linux_arm64.tar.gz")"
          replace_hash 'aicomiter_${version}_macOS_x86_64.tar.gz' \
            "$(checksum_for "aicomiter_${version}_macOS_x86_64.tar.gz")"
          replace_hash 'aicomiter_${version}_macOS_arm64.tar.gz' \
            "$(checksum_for "aicomiter_${version}_macOS_arm64.tar.gz")"

      - name: Install Nix
        uses: cachix/install-nix-action@v31
      - name: Validate and commit flake update
        env:
          VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.update_flake_tag || github.ref_name }}
        run: |
          set -euo pipefail
          nix flake check --no-write-lock-file
          if git diff --quiet -- flake.nix; then
            echo "flake hashes are already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git commit -m "chore: update flake hashes for ${VERSION}"
          git push origin HEAD:main
