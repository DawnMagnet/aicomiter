name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Install Rust 1.97.0
        run: rustup toolchain install 1.97.0 --profile minimal --component rustfmt,clippy
      - uses: Swatinem/rust-cache@v2.9.1
      - run: cargo +1.97.0 fmt --all -- --check
      - run: cargo +1.97.0 clippy --all-targets --all-features -- -D warnings
      - run: cargo +1.97.0 test --all-targets --locked

  release:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    needs: quality
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: Install Rust 1.97.0
        run: rustup toolchain install 1.97.0 --profile minimal
      - name: Install Rust release targets
        run: >-
          rustup target add
          x86_64-unknown-linux-musl
          aarch64-unknown-linux-musl
          x86_64-apple-darwin
          aarch64-apple-darwin
          x86_64-pc-windows-gnu
          aarch64-pc-windows-gnullvm
          --toolchain 1.97.0
      - uses: Swatinem/rust-cache@v2.9.1
      - uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.16.0
      - uses: taiki-e/install-action@v2.83.1
        with:
          tool: cargo-zigbuild@0.23.0
          fallback: none
      - uses: goreleaser/goreleaser-action@v7.2.3
        with:
          distribution: goreleaser
          version: "2.17.0"
          args: release --clean ${{ github.event_name == 'workflow_dispatch' && '--snapshot' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
