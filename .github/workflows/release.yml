name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.97.0
        run: rustup toolchain install 1.97.0 --profile minimal --component rustfmt,clippy
      - run: cargo +1.97.0 fmt --all -- --check
      - run: cargo +1.97.0 clippy --all-targets --all-features -- -D warnings
      - run: cargo +1.97.0 test --all-targets --locked

  release:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    needs: quality
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Rust 1.97.0
        run: rustup toolchain install 1.97.0 --profile minimal
      - name: Install Rust release targets
        run: >-
          rustup target add
          x86_64-unknown-linux-musl
          aarch64-unknown-linux-musl
          x86_64-apple-darwin
          aarch64-apple-darwin
          x86_64-pc-windows-gnu
          aarch64-pc-windows-gnullvm
          --toolchain 1.97.0
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Install cargo-zigbuild
        run: cargo +1.97.0 install cargo-zigbuild --locked
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean ${{ github.event_name == 'workflow_dispatch' && '--snapshot' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
